<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Interactive Todo App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="hero-card">

        <div class="hero-copy">

            <span class="eyebrow">Focus mode</span>

            <h1>Organize your day with clarity</h1>

            <p class="description">
                Capture your next task, mark progress, and keep your goals moving forward in one calm space.
            </p>

        </div>

        <div class="status-panel">

            <div class="status-pill">Today</div>

            <div class="status-number" id="taskCount">
                0 Tasks
            </div>

        </div>

    </div>

    <div class="input-area">

        <input
        type="text"
        id="taskInput"
        placeholder="What do you want to finish today?">

        <button id="addBtn">
            Add Task
        </button>

    </div>

    <div class="filters">

        <button class="filter active"
        data-filter="all">
            All
        </button>

        <button class="filter"
        data-filter="active">
            Active
        </button>

        <button class="filter"
        data-filter="completed">
            Completed
        </button>

    </div>

    <ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
